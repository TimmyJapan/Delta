name: Build Delta Custom Forks (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout Delta (Your Fork)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync Submodule URLs
        run: |
          # This ensures the runner uses the URLs defined in your .gitmodules
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Dependencies
        run: |
          sudo gem install cocoapods xcodeproj
          pod install

      - name: Fix Swift 6 Compatibility & Missing Types
        run: |
          sudo gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          Dir.glob('**/*.xcodeproj').each do |path|
            puts \"Patching #{path}...\"
            project = Xcodeproj::Project.open(path)
            project.targets.each do |target|
              target.build_configurations.each do |config|
                # Force Swift 5 and kill the new concurrency checks
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                config.build_settings['OTHER_SWIFT_FLAGS'] = '$(inherited) -Xfrontend -disable-implicit-concurrency-module-import -Xfrontend -disable-stack-outputs'
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
              end
            end
            project.save
          end"


      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Locate the .app and copy it to Payload
          cp -r build/Delta.xcarchive/Products/Applications/Delta.app Payload/
          # Create the final IPA file
          zip -r Delta-Custom.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Build-Unsigned
          path: Delta-Custom.ipa
