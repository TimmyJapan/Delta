name: Build Delta (Root Features Fix)

on:
  workflow_dispatch:

permissions:
  contents: read  # Added Git permissions to address access issues.

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Checkout Delta (Your Fork)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0



      - name: Sync and Update Submodules
        run: |
　　　　　　git config --global --add safe.directory /github/workspace
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      - name: Patch Source Code & Project Files
        run: |
          # 1. Fix the Swift Version in all project files (GPGX, etc.)
          find . -name "project.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = 6.0;/SWIFT_VERSION = 5.0;/g' {} +
          
          # 2. Fix the 'OptionValue' constraint in Option.swift (Root Directory)
          # This line changes 'struct Option<Value>' to 'struct Option<Value: OptionValue>'
          sed -i '' 's/public struct Option<Value>/public struct Option<Value: OptionValue>/g' DeltaFeatures/Option.swift
          
          # 3. Fix the instance method signature if it's separate
          sed -i '' 's/extension Option where Value/extension Option where Value: OptionValue/g' DeltaFeatures/Option.swift

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Fixed.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Fixed-IPA
          path: Delta-Fixed.ipa