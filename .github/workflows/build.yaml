name: Build Delta (Unsigned IPA)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -workspace Delta.xcworkspace -scheme Delta

      - name: Build Delta (Unsigned)
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ENTITLEMENTS="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload
          cp -r Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Unsigned-IPA
          path: Delta-Unsigned.ipa
