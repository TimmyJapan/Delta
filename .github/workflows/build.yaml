name: Build Delta (Ultimate Compatibility)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Checkout Delta (Your Fork)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync and Update Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      - name: Fix Target Swift Versions
        run: |
          # This command searches every sub-folder (your forks) for project files
          # and changes any "Swift 6.0" requirement to "Swift 5.0" 
          # so Xcode 15.4 can handle them.
          find . -name "project.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = 6.0;/SWIFT_VERSION = 5.0;/g' {} +
          # This also catches cases where it might be 6.x
          find . -name "project.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = 6.[0-9];/SWIFT_VERSION = 5.0;/g' {} +

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Grabs the compiled app from your Root structure
          cp -r build/Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Custom.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Unsigned-Build
          path: Delta-Custom.ipa
