name: Build Delta (Unsigned)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Patch Project Settings
        run: |
          # 全プロジェクトのSwiftバージョンを5.0に統一
          find . -name "*.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = 6.0/SWIFT_VERSION = 5.0/g' {} +
          # Bundle IDとTeamのパッチ
          sed -i '' 's/com.rileytestut.Delta/com.b6259.Delta.custom/g' Delta.xcodeproj/project.pbxproj
          sed -i '' 's/DevelopmentTeam = .*/DevelopmentTeam = "";/g' Delta.xcodeproj/project.pbxproj

      - name: Build Systems Frameworks
        run: |
          xcodebuild build \
            -workspace Systems/Systems.xcworkspace \
            -scheme Systems \
            -destination "generic/platform=iOS" \
            -configuration Release \
            ARCHS="arm64" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Delta App
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Delta.xcarchive \
            ARCHS="arm64" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Custom.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Delta-IPA
          path: Delta-Custom.ipa

