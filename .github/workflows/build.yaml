name: Build Delta 
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Select Xcode 15.4
        # This version of Xcode is 100% compatible with Delta's current code
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Checkout Delta (Your Fork)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Dependencies
        run: |
          sudo gem install cocoapods
          pod install

      - name: Build Unsigned Archive
        run: |
          # We use xcodebuild to create a generic iOS archive without signing
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Since your structure is direct, we pull the .app from the archive
          cp -r build/Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Build.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Delta-IPA-Unsigned
          path: Delta-Build.ipa

 
