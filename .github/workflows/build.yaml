name: Build Unsigned Delta IPA

# This allows you to run the build manually from the GitHub Actions tab
on:
  workflow_dispatch: 

jobs:
  build:
    name: Build IPA
    runs-on: macos-14 # Ensures a modern Xcode environment

    steps:
      - name: Checkout Delta Repository
        uses: actions/checkout@v4
        with:
          # If you are running this in your own fork, you can remove the next line.
          # If running in an empty repo, this pulls directly from Riley's repo.
          repository: rileytestut/Delta 
          submodules: recursive # Crucial: Fetches the SNES, N64, etc. cores

      - name: Install CocoaPods Dependencies
        run: |
          # CocoaPods is usually pre-installed on macOS runners, but updating is safe
          sudo gem install cocoapods
          pod install

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            SWIFT_VERSION=5.0

      - name: Package into IPA
        run: |
          # Create the Payload folder structure Apple expects
          mkdir -p Payload
          # Copy the compiled app into the Payload folder
          cp -r build/Delta.xcarchive/Products/Applications/Delta.app Payload/
          # Zip it up and rename it to .ipa
          zip -r Delta.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Unsigned
          path: Delta.ipa
