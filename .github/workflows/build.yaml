name: Build Delta (Unsigned)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0 # すべての履歴を取得してサブモジュールの不整合を防ぐ

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Patch Project & Fix Dependencies
        run: |
          # Swiftバージョンの強制統一
          find . -name "*.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = 6.0/SWIFT_VERSION = 5.0/g' {} +
          # Bundle IDパッチ
          sed -i '' 's/com.rileytestut.Delta/com.b6259.Delta.custom/g' Delta.xcodeproj/project.pbxproj
          # 依存関係のクリーンアップ（キャッシュ起因のエラー対策）
          rm -rf ~/Library/Developer/Xcode/DerivedData/

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies -workspace Delta.xcworkspace -scheme Delta
          xcodebuild -resolvePackageDependencies -workspace Systems/Systems.xcworkspace -scheme Systems

      - name: Build Systems Frameworks
        run: |
          xcodebuild build \
            -workspace Systems/Systems.xcworkspace \
            -scheme Systems \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-suppress-warnings"

      - name: Build Delta App
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_SWIFT_FLAGS="-suppress-warnings"

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r Delta.xcarchive/Products/Applications/Delta.app Payload/
          zip -r Delta-Custom.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Delta-IPA
          path: Delta-Custom.ipa
